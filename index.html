<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Streitschlichter</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>Streitschlichter</h1>

<div class="tabs">
<button onclick="show('home')">Info</button>
<button onclick="show('photos')">Fotos</button>
<button onclick="show('termin')">Termin</button>
</div>

<section id="home">
<p>Hier helfen wir bei Konflikten.</p>
<p><b>Ort:</b> Raum 008</p>
</section>

<section id="photos" class="hidden">
<div class="photo"></div>
<div class="photo"></div>
</section>

<section id="termin" class="hidden">

<input id="name" placeholder="Name">
<input id="klasse" placeholder="Klasse">
<input type="date" id="date">

<select id="pause">
<option>1. Pause</option>
<option>2. Pause</option>
</select>

<button onclick="save()">Termin buchen</button>

</section>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
