<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streitschlichter</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="app">

<h1>Streitschlichter</h1>
<p class="subtitle">Raum 008</p>

<!-- SCREENS -->

<div id="info" class="screen active">
  <div class="card">
    Hier helfen wir bei Konflikten.
  </div>
</div>

<div id="photos" class="screen">
  <div class="card photos">
    <div class="photo"></div>
    <div class="photo"></div>
  </div>
</div>

<div id="termin" class="screen">
  <div class="card">

    <input id="name" placeholder="Name">
    <input id="klasse" placeholder="Klasse">
    <input type="date" id="date">

    <select id="pause">
      <option>1. Pause</option>
      <option>2. Pause</option>
    </select>

    <button class="btn" onclick="save()">Termin buchen</button>

  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('info')">Info</button>
  <button onclick="show('photos')">Fotos</button>
  <button onclick="show('termin')">Termin</button>
</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
