<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streitschlichter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Streitschlichter</h1>
<p class="subtitle">Raum 008</p>

<!-- SCREENS -->
<div id="info" class="screen active">
  <div class="card">
    Hier helfen wir bei Konflikten.
  </div>
</div>

<div id="photos" class="screen">
  <div class="card photos">
    <div class="photo"></div>
    <div class="photo"></div>
  </div>
</div>

<div id="termin" class="screen">
  <div class="card">

    <input placeholder="Name">
    <input placeholder="Klasse">
    <input type="date">

    <select>
      <option>1. Pause</option>
      <option>2. Pause</option>
    </select>

    <button class="btn">Termin buchen</button>

  </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="show('info')">Info</button>
  <button onclick="show('photos')">Fotos</button>
  <button onclick="show('termin')">Termin</button>
</div>

<script src="app.js"></script>

</body>
</html>
