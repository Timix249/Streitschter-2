<div class="container">

<h1>Admin Panel</h1>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">

<button class="primary" onclick="login()">Login</button>
<button class="secondary" onclick="loginGoogle()">Google Login</button>
</div>

<div id="pinBox" class="card hidden">
<input id="pinInput" placeholder="PIN">
<button class="primary" onclick="checkPin()">Weiter</button>
</div>

<div id="setPinBox" class="card hidden">
<input id="newPin" placeholder="Neuer PIN">
<button class="primary" onclick="savePin()">Speichern</button>
</div>

<div id="panel" class="card hidden">
<h2>Kalender</h2>
<div id="calendar"></div>
</div>

</div>
