<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>

<body>

<h1>Admin Panel</h1>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
<button onclick="loginGoogle()">Login mit Google</button>
</div>

<!-- PIN -->
<div id="pinBox" class="hidden">
<input id="pinInput" placeholder="PIN">
<button onclick="checkPin()">Weiter</button>
</div>

<!-- SET PIN -->
<div id="setPinBox" class="hidden">
<input id="newPin" placeholder="Neuer PIN">
<button onclick="savePin()">Speichern</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<h2>Kalender</h2>
<div id="calendar"></div>

<h2>Termine</h2>
<div id="list"></div>

</div>

<script src="firebase.js"></script>
<script src="admin.js"></script>

</body>
</html>
